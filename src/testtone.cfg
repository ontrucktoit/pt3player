MEMORY {
    ZP:      start = $0002, size = $00FE, type = rw;
    HEADER:  start = $1001, size = $000F, type = ro, file = %O, fill = yes, fillval = $00;
    STARTUP: start = $1010, size = $1FF0, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    BASIC:   load = HEADER,  type = ro;
    CODE:    load = STARTUP, type = ro;
}
