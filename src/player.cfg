# =============================================================================
# player.cfg - ld65 linker config for PT3 Player library
# =============================================================================
# PLAYER_BASE = $1100 — placed immediately after the BASIC stub + startup code
# region ($1001-$10FF). This is the canonical/default base address for the
# library; users embedding the player in their own programs are free to relink
# to any other address by editing this cfg.
#
# size = $2F00 reserves $1100-$3FFF (12 KB) which gives ample headroom both
# for the engine code+RODATA (~5.2 KB) and the BSS that follows. Note that
# 'fill = no' means linker stops at end of last segment — no zero padding —
# so player.bin file size matches the real footprint, not the reserved size.
#
# After player+BSS we recommend PT3 data at $4000 (clean 16-bit boundary,
# 16 KB free RAM up to $7FFF, no ROM conflict).
# =============================================================================

MEMORY {
    PLAYER: start = $1100, size = $2F00, type = rw, fill = no;
}

SEGMENTS {
    CODE:    load = PLAYER, type = ro,  start = $1100;
    RODATA:  load = PLAYER, type = ro;
    BSS:     load = PLAYER, type = bss, define = yes;
}
