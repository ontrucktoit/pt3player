# =============================================================================
# player.cfg - ld65 linker config for PT3 Player library
# =============================================================================
# Produces a raw binary at $3000 (no .prg load-address header).
# Why raw and not .prg?
#   - The player is a library module, loaded by a host program into a fixed
#     location. The host's own .prg has the real load-address header.
#   - For the py65 harness, we memcpy raw bytes into the simulator's RAM
#     at $3000; a .prg wrapper would just need to be stripped.
#
# Total binary size must fit in 4096 bytes ($3000-$3FFF).
# =============================================================================

MEMORY {
    # The player lives entirely inside $3000-$3FFF (4 KB).
    # Reserve the full 4 KB; ld65 will fill unused space with $00 (or zero
    # if we explicitly fill=yes).
    PLAYER: start = $3000, size = $1000, type = rw, fill = yes, fillval = $00;
}

SEGMENTS {
    # Code segment: starts at $3000 with the jump table, then procedures.
    CODE:    load = PLAYER, type = ro,  start = $3000;

    # Read-only data: tables, constants, etc. Placed immediately after code.
    RODATA:  load = PLAYER, type = ro;

    # BSS (zero-initialized RAM state): shadow AY, channel state, runtime tables.
    # Uses the tail of the $3000-$3FFF region.
    BSS:     load = PLAYER, type = bss, define = yes;
}

# =============================================================================
