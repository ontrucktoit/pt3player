# =============================================================================
# player.cfg - ld65 linker config for PT3 Player library
# =============================================================================
# M6 expansion: player grows from 4 KB ($3000-$3FFF) to 8 KB ($3000-$4FFF)
# to accommodate per-tick state machine + pattern engine + AY writes without
# pre-optimization. Optimization back down to 4 KB is a later pass.
#
# PT3 file is loaded at $8000 (standard). Plenty of room: $5000-$7FFF is free,
# plus the $4000-$4FFF player expansion doesn't clash with anything.
# =============================================================================

MEMORY {
    PLAYER: start = $3000, size = $2000, type = rw, fill = yes, fillval = $00;
}

SEGMENTS {
    CODE:    load = PLAYER, type = ro,  start = $3000;
    RODATA:  load = PLAYER, type = ro;
    BSS:     load = PLAYER, type = bss, define = yes;
}
