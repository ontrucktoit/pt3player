# =============================================================================
# pt3player.cfg — startup wrapper for pt3player.prg (standalone player)
# =============================================================================
# Builds the wrapper part: 2-byte PRG load-addr header + BASIC stub + startup
# code. tools/build_pt3player.py concatenates this with player.bin to produce
# the final pt3player.prg (no PT3 embedded — user loads PT3 manually via
# machine monitor).
# =============================================================================

MEMORY {
    # 2-byte PRG header at file offset 0,1 (load address LE = $1001)
    LOADADDR: start = $0000, size = $0002, type = ro, file = %O, fill = yes;

    # Plus/4 user RAM. Wrapper occupies $1001-$10FF (255 bytes).
    MAIN:     start = $1001, size = $00FF, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    LOADADDRHDR: load = LOADADDR, type = ro;
    BASIC:       load = MAIN, type = ro;
    CODE:        load = MAIN, type = ro;
}

SYMBOLS {
    __LOADADDR__: type = weak, value = $1001;
}

FEATURES {
    STARTADDRESS: default = $1001;
}
