# =============================================================================
# m1_test.cfg - ld65 config for Plus/4 .prg test host
# =============================================================================
# Produces a .prg file:
#   bytes[0..1]  = $01 $10 (load address $1001, little-endian)
#   bytes[2..N]  = BASIC_STUB segment (starts at $1001)
#                  CODE segment
#                  player_data (.incbin of player.bin, 4096 bytes)
# =============================================================================

MEMORY {
    # .prg load-address header (first 2 bytes of file)
    LOADADDR: start = $0000, size = $0002, type = ro, file = %O, fill = yes;

    # Program memory starting at Plus/4 BASIC area ($1001)
    # 24 KB should be plenty for a 4 KB embedded player + ~500 bytes of host code
    MAIN:     start = $1001, size = $6000, type = ro, file = %O;
}

SEGMENTS {
    LOADADDRHDR: load = LOADADDR, type = ro;
    BASIC_STUB:  load = MAIN, type = ro;
    CODE:        load = MAIN, type = ro;
    RODATA:      load = MAIN, type = ro;
}

SYMBOLS {
    __LOADADDR__: type = weak, value = $1001;
}

# Emit the 2-byte load-address header
FEATURES {
    STARTADDRESS: default = $1001;
}

# =============================================================================
